name: Daily Sary Sprint Report

on:
  schedule:
    # 10:00 AM Bangladesh time (BST = UTC+6) = 04:00 UTC
    # Runs Sun=0, Mon=1, Tue=2, Wed=3, Thu=4
    - cron: '0 4 * * 0,1,2,3,4'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Jira Sprint & Send to Google Chat
        env:
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          GCHAT_WEBHOOK: ${{ secrets.GCHAT_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.parse, datetime, os

          # Read secrets from environment
          domain = os.environ['JIRA_DOMAIN']
          email = os.environ['JIRA_EMAIL']
          token = os.environ['JIRA_TOKEN']
          webhook_url = os.environ['GCHAT_WEBHOOK']

          # Fetch from Vercel proxy
          params = urllib.parse.urlencode({
              'domain': domain,
              'email': email,
              'token': token,
              'projectKey': 'SARY'
          })
          url = f"https://jira-proxy-two.vercel.app/jira?{params}"
          req = urllib.request.Request(url)
          with urllib.request.urlopen(req) as res:
              data = json.loads(res.read().decode())

          issues = data.get('issues', [])
          today = datetime.datetime.now().strftime('%Y-%m-%d')

          type_icons = {
              'Bug': '🐛', 'Sub-Bug': '🐞',
              'Task': '✅', 'Story': '📖', 'Epic': '⚡'
          }
          priority_icons = {
              'Highest': '🔴', 'High': '🟠',
              'Medium': '🟡', 'Low': '🟢', 'Lowest': '🔵'
          }
          priority_order = ['Highest', 'High', 'Medium', 'Low', 'Lowest']

          # Get sprint name
          sprint_name = ''
          for issue in issues:
              sf = issue['fields'].get('customfield_10020', [])
              if isinstance(sf, list):
                  for s in sf:
                      if s.get('state') == 'active':
                          sprint_name = s.get('name', '')
                          break
              if sprint_name:
                  break

          if not issues:
              message = f"📋 *Jira Sprint Report — SARY*\n📅 {today}\n\nNo open tickets! 🎉"
          else:
              # Group by priority
              grouped = {}
              for issue in issues:
                  p = issue['fields'].get('priority', {}).get('name', 'Medium')
                  grouped.setdefault(p, []).append(issue)

              title = f"Jira Sprint Report — SARY - {sprint_name}" if sprint_name else "Jira Sprint Report — SARY"
              lines = [
                  f"📋 *{title}*",
                  f"*Project:* SARY | *Open Tickets:* {len(issues)}",
                  "━━━━━━━━━━━━━━━━━━━"
              ]

              for priority in priority_order:
                  if priority not in grouped:
                      continue
                  p_icon = priority_icons.get(priority, '⚪')
                  lines.append(f"\n{p_icon} *{priority} Priority*")
                  for issue in grouped[priority]:
                      key = issue['key']
                      fields = issue['fields']
                      summary = fields.get('summary', '')
                      status = fields.get('status', {}).get('name', 'Unknown')
                      assignee = fields.get('assignee') or {}
                      assignee_name = assignee.get('displayName', 'Unassigned')
                      issue_type = fields.get('issuetype', {}).get('name', 'Unknown')
                      icon = type_icons.get(issue_type, '📌')
                      lines.append(f"{icon} *{key}* — {summary}")
                      lines.append(f"   👤 {assignee_name} | 📌 {status}")

              lines.append(f"\n━━━━━━━━━━━━━━━━━━━")
              lines.append(f"_Report generated on {today} 10:00 AM BST_")
              message = "\n".join(lines)

          # Send to Google Chat
          payload = json.dumps({"text": message}).encode('utf-8')
          req = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          print(f"✅ Report sent! {len(issues)} tickets.")
          EOF